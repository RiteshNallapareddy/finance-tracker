<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <h1>💰 Finance Tracker</h1>
    </header>

    <div class="dashboard">
        <!-- TOP: Summary -->
        <section class="summary-section">
            <h2>Financial Summary</h2>
            <div class="summary-cards">
                <div class="card balance">
                    <h3>Balance</h3>
                    <p id="balance">$0</p>
                </div>
                <div class="card income">
                    <h3>Total Income</h3>
                    <p id="total-income">$0</p>
                </div>
                <div class="card expenses">
                    <h3>Total Expenses</h3>
                    <p id="total-expenses">$0</p>
                </div>
            </div>
        </section>

        <!-- MIDDLE LEFT: Transactions -->
        <section class="transactions-section">
            <h2>Transactions</h2>
            <div class="add-form">
                <input type="number" id="amount" placeholder="Amount">
                <input type="text" id="category" placeholder="Category">
                <select id="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <input type="date" id="date">
                <input type="text" id="description" placeholder="Description">
                <button onclick="addTransaction()">Add Transaction</button>
            </div>
            <div id="transactions-list"></div>
        </section>

        <!-- MIDDLE RIGHT: Portfolio -->
        <section class="portfolio-section">
            <h2>Stock Portfolio</h2>
            <div class="add-form">
                <input type="text" id="stock-name" placeholder="Stock Name">
                <input type="text" id="symbol" placeholder="Symbol (e.g. AAPL)">
                <input type="number" id="shares" placeholder="Shares">
                <input type="number" id="purchase-price" placeholder="Purchase Price">
                <input type="date" id="purchase-date">
                <button onclick="addStock()">Add Stock</button>
            </div>
            <div id="portfolio-list"></div>
        </section>

        <!-- BOTTOM: News -->
        <section class="news-section">
            <h2>Financial News</h2>
            <div class="news-filter">
                <input type="text" id="news-symbol" placeholder="Filter by symbol (e.g. AAPL)">
                <button onclick="loadStockNews()">Search</button>
                <button onclick="loadNews()">General News</button>
            </div>
            <div id="news-list"></div>
        </section>
    </div>

    <script src="scripts/main.js"></script>
</body>
</html>
